<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Secure healthcare enterprise network architecture">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; rx: 18; }
      .zone { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 24; }
      .zoneTitle { font: 700 20px Arial, sans-serif; fill: #334155; }
      .label { font: 700 18px Arial, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #6b7280; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dline { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
      .ha { stroke: #0f766e; stroke-width: 4; fill: none; }
      .badge { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.5; rx: 10; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 z" fill="#334155" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#f3f4f6"/>
  <text x="60" y="62" class="title">Secure Healthcare Enterprise Network Architecture</text>
  <text x="60" y="94" class="subtitle">Multi-floor enterprise design with segmentation, firewall zoning, redundancy, wireless, voice, DMZ services, ISP, and cloud connectivity</text>

  <!-- Outside / cloud zone -->
  <rect x="60" y="130" width="1280" height="120" class="zone"/>
  <text x="85" y="162" class="zoneTitle">Outside / Provider / Cloud Edge</text>
  <rect x="180" y="180" width="210" height="46" class="box"/>
  <text x="205" y="209" class="label">ISP / Internet</text>
  <rect x="1010" y="180" width="240" height="46" class="box"/>
  <text x="1040" y="209" class="label">AWS Cloud Simulation</text>
  <path d="M390 203 C560 140, 800 140, 1010 203" class="dline"/>

  <!-- Security edge -->
  <rect x="60" y="290" width="1280" height="145" class="zone"/>
  <text x="85" y="322" class="zoneTitle">Security Edge</text>
  <rect x="555" y="340" width="290" height="70" class="box"/>
  <text x="618" y="368" class="label">Cisco ASA Firewall</text>
  <text x="600" y="393" class="small">Outside / Inside / DMZ zones • NAT • ACLs</text>
  <path d="M285 226 L620 340" class="line"/>
  <path d="M1250 203 L845 340" class="dline"/>

  <!-- Enterprise routing/core -->
  <rect x="60" y="475" width="1280" height="200" class="zone"/>
  <text x="85" y="507" class="zoneTitle">Enterprise Core / Distribution</text>
  <rect x="570" y="525" width="260" height="55" class="box"/>
  <text x="604" y="559" class="label">Enterprise Edge Router</text>
  <rect x="405" y="610" width="260" height="55" class="box"/>
  <text x="445" y="642" class="label">Multilayer Switch 1</text>
  <text x="486" y="661" class="tiny">HSRP Active • SVIs • OSPF</text>
  <rect x="735" y="610" width="260" height="55" class="box"/>
  <text x="775" y="642" class="label">Multilayer Switch 2</text>
  <text x="810" y="661" class="tiny">HSRP Standby • SVIs • OSPF</text>
  <path d="M700 410 L700 525" class="line"/>
  <path d="M650 580 L535 610" class="line"/>
  <path d="M750 580 L865 610" class="line"/>
  <path d="M665 638 L735 638" class="ha"/>
  <text x="675" y="628" class="tiny">LACP EtherChannel</text>

  <!-- DMZ and services -->
  <rect x="80" y="525" width="250" height="115" class="box"/>
  <text x="138" y="553" class="label">DMZ Server Farm</text>
  <text x="105" y="581" class="small">Directory • DNS • DHCP</text>
  <text x="105" y="605" class="small">Email • File • HIS servers</text>
  <text x="105" y="629" class="tiny">Static addressing • firewall-controlled access</text>
  <path d="M555 375 C420 410, 320 455, 250 525" class="line"/>

  <!-- Wireless and voice services -->
  <rect x="1080" y="515" width="220" height="62" class="box"/>
  <text x="1116" y="550" class="label">Wireless LAN Controller</text>
  <rect x="1080" y="600" width="220" height="62" class="box"/>
  <text x="1138" y="635" class="label">VoIP Router</text>
  <path d="M995 638 C1030 610, 1050 560, 1080 548" class="line"/>
  <path d="M995 638 C1030 650, 1050 640, 1080 632" class="line"/>

  <!-- Access/user zone -->
  <rect x="60" y="715" width="1280" height="135" class="zone"/>
  <text x="85" y="747" class="zoneTitle">Access Layer / User Segments</text>
  <rect x="145" y="780" width="220" height="44" class="badge"/>
  <text x="185" y="808" class="label">VLAN 10 - Wired LAN</text>
  <rect x="430" y="780" width="220" height="44" class="badge"/>
  <text x="466" y="808" class="label">VLAN 50 - Wireless</text>
  <rect x="715" y="780" width="220" height="44" class="badge"/>
  <text x="758" y="808" class="label">VLAN 99 - Voice</text>
  <rect x="1000" y="780" width="250" height="44" class="badge"/>
  <text x="1031" y="808" class="label">Guest / Corporate SSIDs</text>
  <path d="M535 665 C455 700, 350 735, 260 780" class="line"/>
  <path d="M865 665 C770 700, 650 735, 540 780" class="line"/>
  <path d="M1190 577 C1015 650, 820 715, 825 780" class="line"/>
  <path d="M1190 662 C1180 700, 1150 745, 1125 780" class="line"/>

  <text x="60" y="880" class="tiny">Portfolio case study artifact: add your Packet Tracer topology screenshot and verification screenshots in assets/ before final public submission.</text>
</svg>