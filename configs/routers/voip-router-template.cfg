! VoIP Router / CME Template
! Packet Tracer voice support varies by router model.

enable
configure terminal
hostname VOIP-RTR
no ip domain-lookup
service password-encryption

interface fa0/1
 description TRUNK_TO_SWITCH
 no shutdown

interface fa0/1.99
 description VOICE_SUBINTERFACE
 encapsulation dot1Q 99
 ip address 172.16.0.1 255.255.240.0

ip dhcp pool VOICE_POOL
 network 172.16.0.0 255.255.240.0
 default-router 172.16.0.1
 option 150 ip 172.16.0.1
 dns-server 10.20.10.10

telephony-service
 max-ephones 50
 max-dn 50
 ip source-address 172.16.0.1 port 2000
 auto assign 1 to 50

ephone-dn 1
 number 3001
ephone-dn 2
 number 3002
ephone-dn 3
 number 3003

end
write memory
