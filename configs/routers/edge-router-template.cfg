! Enterprise Edge Router Template

enable
configure terminal
hostname EDGE-RTR
no ip domain-lookup
service password-encryption
ip cef

interface <TO_ASA_INSIDE>
 description LINK_TO_ASA_INSIDE
 ip address <EDGE_TO_ASA_IP> <MASK>
 no shutdown

interface <TO_MLS1>
 description LINK_TO_MLS1
 ip address <EDGE_TO_MLS1_IP> <MASK>
 no shutdown

interface <TO_MLS2>
 description LINK_TO_MLS2
 ip address <EDGE_TO_MLS2_IP> <MASK>
 no shutdown

router ospf 25
 router-id 3.3.3.3
 network 10.30.10.0 0.0.0.255 area 0
 default-information originate

ip route 0.0.0.0 0.0.0.0 <ASA_INSIDE_NEXT_HOP>

end
write memory
