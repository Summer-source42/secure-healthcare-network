! Cisco ASA Firewall Template
! Replace interfaces and IPs to match your topology.

enable
configure terminal
hostname ASA-HQ

interface gig1/1
 description INSIDE_TO_ENTERPRISE_EDGE
 nameif inside
 security-level 100
 ip address 10.30.10.1 255.255.255.252
 no shutdown

interface gig1/2
 description DMZ_SERVER_FARM
 nameif dmz
 security-level 70
 ip address 10.20.10.1 255.255.255.192
 no shutdown

interface gig1/3
 description OUTSIDE_TO_ISP
 nameif outside
 security-level 0
 ip address 197.200.100.2 255.255.255.252
 no shutdown

route outside 0.0.0.0 0.0.0.0 197.200.100.1

router ospf 25
 router-id 7.7.7.7
 network 10.20.10.0 255.255.255.192 area 0
 network 10.30.10.0 255.255.255.252 area 0
 network 197.200.100.0 255.255.255.252 area 0

object network LAN_TO_INTERNET
 subnet 10.10.0.0 255.255.0.0
 nat (inside,outside) dynamic interface

object network WLAN_TO_INTERNET
 subnet 192.168.0.0 255.255.240.0
 nat (inside,outside) dynamic interface

object network DMZ_TO_INTERNET
 subnet 10.20.10.0 255.255.255.192
 nat (dmz,outside) dynamic interface

! Example least-privilege ACLs. Adjust ports to match lab services.
access-list INSIDE_IN extended permit udp any host 10.20.10.10 eq domain
access-list INSIDE_IN extended permit tcp any host 10.20.10.20 eq 443
access-list INSIDE_IN extended permit icmp any any echo
access-list INSIDE_IN extended deny ip any any log
access-group INSIDE_IN in interface inside

access-list OUTSIDE_IN extended permit tcp any host <PUBLIC_DMZ_SERVICE_IP> eq 443
access-list OUTSIDE_IN extended deny ip any any log
access-group OUTSIDE_IN in interface outside

write memory
