! Multilayer Switch 2 Template - HSRP Standby

enable
configure terminal
hostname MLS2
no ip domain-lookup
service password-encryption
ip routing

vlan 10
 name LAN
vlan 50
 name WLAN
vlan 99
 name VOICE
vlan 999
 name BLACKHOLE_UNUSED

interface vlan 10
 description LAN_GATEWAY_HSRP_STANDBY
 ip address 10.10.0.2 255.255.0.0
 ip helper-address 10.20.10.10
 standby 10 ip 10.10.0.1
 standby 10 priority 110
 standby 10 preempt

interface vlan 50
 description WLAN_GATEWAY_HSRP_STANDBY
 ip address 192.168.0.2 255.255.240.0
 ip helper-address 10.20.10.10
 standby 50 ip 192.168.0.1
 standby 50 priority 110
 standby 50 preempt

interface vlan 99
 description VOICE_GATEWAY_HSRP_STANDBY
 ip address 172.16.0.2 255.255.240.0
 standby 99 ip 172.16.0.1
 standby 99 priority 110
 standby 99 preempt

interface range gig1/0/2 - 8
 description TRUNKS_TO_ACCESS_SWITCHES
 switchport mode trunk
 switchport trunk allowed vlan 10,50,99
 switchport nonegotiate

interface range gig1/0/21 - 24
 description LACP_TO_MLS1
 switchport mode trunk
 switchport trunk allowed vlan 10,50,99
 channel-group 1 mode active

interface port-channel 1
 description LACP_PORT_CHANNEL_TO_MLS1
 switchport mode trunk
 switchport trunk allowed vlan 10,50,99

router ospf 25
 router-id 2.2.2.2
 network 10.10.0.0 0.0.255.255 area 0
 network 192.168.0.0 0.0.15.255 area 0
 network 172.16.0.0 0.0.15.255 area 0
 network 10.30.10.0 0.0.0.255 area 0

end
write memory
