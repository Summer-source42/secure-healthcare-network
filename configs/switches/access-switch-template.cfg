! Access Switch Template - Department Switch
! Replace interface numbers as needed.

enable
configure terminal
hostname ACCESS-SW-DEPARTMENT
no ip domain-lookup
service password-encryption
banner motd # Unauthorized access is prohibited #
enable secret <STRONG_SECRET>
username netadmin privilege 15 secret <STRONG_SECRET>
ip domain-name healthcare.local
crypto key generate rsa modulus 2048
ip ssh version 2

vlan 10
 name LAN
vlan 50
 name WLAN
vlan 99
 name VOICE
vlan 999
 name BLACKHOLE_UNUSED

interface range fa0/1 - 2
 description UPLINK_TO_MULTILAYER_SWITCHES
 switchport mode trunk
 switchport trunk allowed vlan 10,50,99
 switchport nonegotiate

interface range fa0/3 - 20
 description WIRED_USER_PORTS
 switchport mode access
 switchport access vlan 10
 switchport voice vlan 99
 spanning-tree portfast
 spanning-tree bpduguard enable
 switchport port-security
 switchport port-security maximum 2
 switchport port-security violation restrict
 switchport port-security mac-address sticky
 storm-control broadcast level 5.00

interface range fa0/21 - 24
 description ACCESS_POINT_PORTS
 switchport mode access
 switchport access vlan 50
 spanning-tree portfast
 spanning-tree bpduguard enable

interface range fa0/25 - 48
 description UNUSED_DISABLED
 switchport mode access
 switchport access vlan 999
 shutdown

ip access-list standard MGMT_SSH_ONLY
 permit <ADMIN_PC_IP>
 deny any log

line console 0
 password <CONSOLE_SECRET>
 login
line vty 0 4
 login local
 transport input ssh
 access-class MGMT_SSH_ONLY in
end
write memory
